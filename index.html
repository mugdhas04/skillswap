<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillSwap – Home</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <div class="orbs"></div>
    <nav class="top-nav" id="navbar"></nav>

      <div class="auth-actions">

        <a href="login.html" id="secondary-entry" class="ghost-btn">I Already Have One</a>
