<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – SkillSwap</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="orbs"></div>
    <nav class="top-nav" id="navbar"></nav>
    <main class="form-container">
      <h1 class="headline">Log In</h1>
      <p class="subtext">
        Continue your active swaps, requests, and conversations.
      </p>
      <form id="loginForm" class="stack">
        <label>
          Email
          <input type="email" id="login-email" placeholder="name@email.com" required />
        </label>
        <label>
          Password
          <input type="password" id="login-password" placeholder="Enter password" required />
        </label>
        <button type="submit" class="cta-button">Log In</button>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
