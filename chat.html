<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat – SkillSwap</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="orbs"></div>
    <nav class="top-nav" id="navbar">
      <!-- This content is dynamically injected via script.js -->
    </nav>

    <main class="dashboard-container">
      <h1 class="headline">Chat with <span id="chat-user">User</span></h1>
      <div class="chat-box" id="chat-box"></div>
      <form id="chat-form" class="chat-form">
        <input
          type="text"
          id="chat-input"
          placeholder="Type a message..."
          required
        />
        <button type="submit" class="swap-btn">Send</button>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
